  <text x="20" y="61" fill="#3fb950" font-size="13" font-weight="bold" font-family='Cascadia Code, Consolas, Menlo, monospace'>$ </text>
  <text x="34" y="61" fill="#ffffff" font-size="13" font-weight="bold" font-family='Cascadia Code, Consolas, Menlo, monospace'>calendarsync account add google-personal --id personal</text>
