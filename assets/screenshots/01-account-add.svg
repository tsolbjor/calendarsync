  <text x="251" y="80" fill="#3fb950" font-size="13" font-weight="normal" font-family='Cascadia Code, Consolas, Menlo, monospace'>' added. Run 'setup' or 'account login personal' to authorise.</text>
  <text x="20" y="118" fill="#3fb950" font-size="13" font-weight="bold" font-family='Cascadia Code, Consolas, Menlo, monospace'>$ </text>
